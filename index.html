<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة أيام الطيبين 🎨</title>

<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#5f2c82,#49a09d);
  color:#fff;
  text-align:center;
}

.screen { display:none; }
.active { display:block; }

.card {
  background:#fff;
  color:#000;
  padding:20px;
  margin:20px auto;
  border-radius:20px;
  max-width:500px;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#5f2c82;
  color:#fff;
  cursor:pointer;
}

input {
  padding:10px;
  width:80%;
  margin:5px;
  border-radius:10px;
  border:none;
}

canvas {
  background:#fff;
  border-radius:10px;
  touch-action:none;
}

#chat {
  height:150px;
  overflow:auto;
  background:#eee;
  color:#000;
  border-radius:10px;
  padding:10px;
}
</style>
</head>

<body>

<h1>🎨 لعبة أيام الطيبين</h1>

<!-- HOME -->
<div id="home" class="screen active">
<div class="card">
<input id="name" placeholder="اسمك">
<input id="code" placeholder="كود الغرفة">
<br>
<button onclick="createRoom()">إنشاء غرفة</button>
<button onclick="joinRoom()">دخول</button>
</div>
</div>

<!-- GAME -->
<div id="game" class="screen">

<div class="card">
<h3 id="status">...</h3>
</div>

<div class="card">
<canvas id="board" width="400" height="300"></canvas>
</div>

<div class="card">
<input id="chatInput">
<button onclick="sendChat()">إرسال</button>
<button onclick="voice()">🎤</button>
</div>

<div class="card">
<div id="chat"></div>
</div>

</div>

<script>

// ================= SOCKET =================
const SERVER_URL = "https://draw-party-production.up.railway.app";
const socket = io(SERVER_URL);

// ================= STATE =================
let roomCode = "";
let playerName = "";

// ================= NAV =================
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ================= CREATE =================
function createRoom(){
  playerName = document.getElementById("name").value || "لاعب";

  socket.emit("room:create",{
    name:playerName,
    maxPlayers:6,
    teamCount:2,
    roundSeconds:60
  });
}

// ================= JOIN =================
function joinRoom(){
  playerName = document.getElementById("name").value || "لاعب";
  roomCode = document.getElementById("code").value;

  socket.emit("room:join",{
    roomCode,
    name:playerName
  });
}

// ================= EVENTS =================
socket.on("room:created",(data)=>{
  roomCode = data.roomCode;
  show("game");
});

socket.on("room:state",(state)=>{
  document.getElementById("status").innerText =
    "الجولة: " + state.currentRound;
});

// ================= CHAT =================
function sendChat(){
  const text = chatInput.value;
  socket.emit("chat:send",{roomCode,playerName,text});
  chatInput.value="";
}

socket.on("chat:message",(msg)=>{
  addChat(msg.playerName + ": " + msg.text);
});

function addChat(t){
  const div=document.createElement("div");
  div.innerText=t;
  chat.appendChild(div);
}

// ================= DRAW =================
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

let drawing=false;

function getPos(e){
  const rect=canvas.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return {x:t.clientX-rect.left,y:t.clientY-rect.top};
}

canvas.addEventListener("mousedown",()=>drawing=true);
canvas.addEventListener("mouseup",()=>drawing=false);

canvas.addEventListener("mousemove",(e)=>{
  if(!drawing) return;
  const p=getPos(e);
  ctx.fillRect(p.x,p.y,4,4);
  socket.emit("draw:move",{roomCode,...p});
});

// mobile
canvas.addEventListener("touchstart",()=>drawing=true);
canvas.addEventListener("touchend",()=>drawing=false);

canvas.addEventListener("touchmove",(e)=>{
  if(!drawing) return;
  e.preventDefault();
  const p=getPos(e);
  ctx.fillRect(p.x,p.y,4,4);
  socket.emit("draw:move",{roomCode,...p});
});

socket.on("draw:move",(d)=>{
  ctx.fillRect(d.x,d.y,4,4);
});

// ================= VOICE =================
function voice(){
  const r=new webkitSpeechRecognition();
  r.lang="ar";
  r.onresult=(e)=>{
    chatInput.value=e.results[0][0].transcript;
    sendChat();
  };
  r.start();
}

</script>

</body>
</html>
