<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لعبة أيام الطيبين</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      color: #122033;
    }

    .container {
      width: min(1100px, 94%);
      margin: 24px auto 80px;
    }

    .hero, .card {
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
      padding: 22px;
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 54px;
      text-align: center;
    }

    .hero p {
      margin: 0;
      text-align: center;
      line-height: 1.8;
      color: #44546a;
    }

    .badges {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .badge {
      background: #f6f8fc;
      border: 1px solid #dbe4f0;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
    }

    h2, h3 {
      margin: 0 0 14px;
    }

    .muted {
      color: #66758b;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid-2 {
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
