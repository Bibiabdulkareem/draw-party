<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أيام الطيبين 🎨</title>

<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#4f46e5;
  color:white;
  text-align:center;
}

.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px;
  border-radius:15px;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#4f46e5;
  color:white;
}

.choice{
  background:#ddd;
  margin:5px;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🎨 أيام الطيبين</h1>

<div id="home">
<input id="name" placeholder="اسمك"><br>
<input id="roomName" placeholder="اسم الغرفة"><br>
<button onclick="create()">إنشاء غرفة</button>

<hr>

<input id="joinCode" placeholder="كود الغرفة"><br>
<button onclick="join()">دخول</button>
</div>

<div id="game" style="display:none">

<div class="card">
<h3 id="status">...</h3>
</div>

<div class="card">
<div id="choices"></div>
</div>

<div class="card">
<input id="chat">
<button onclick="send()">إرسال</button>
<button onclick="voice()">🎤</button>
</div>

<div class="card" id="chatBox"></div>

<div class="card" id="scores"></div>

<button onclick="start()">ابدأ الجولة</button>
<button onclick="leave()">🚪 خروج</button>

</div>

<script>

const socket = io("https://draw-party-production.up.railway.app");

let code="";
let isDrawer=false;

function create(){
  socket.emit("createRoom",{
    name:name.value,
    roomName:roomName.value
  });
}

function join(){
  code = joinCode.value;
  socket.emit("joinRoom",{code,name:name.value});

  home.style.display="none";
  game.style.display="block";
}

socket.on("roomCreated",(d)=>{
  code = d.code;
  alert("كود الغرفة: "+code);
});

function start(){
  socket.emit("startRound",code);
}

socket.on("roundStart",(d)=>{
  status.innerText="الفئة: "+d.category;

  choices.innerHTML="";
  d.choices.forEach(c=>{
    const div=document.createElement("div");
    div.className="choice";
    div.innerText=c;
    div.onclick=()=>sendChoice(c);
    choices.appendChild(div);
  });
});

socket.on("yourTurn",(word)=>{
  isDrawer=true;
  status.innerText="🎨 ارسم: "+word;
});

function send(){
  socket.emit("guess",{code,text:chat.value});
}

function sendChoice(choice){
  socket.emit("guess",{code,text:choice});
}

socket.on("correct",(d)=>{
  chatBox.innerHTML+=`<div>🎉 ${d.name} +${d.points}</div>`;

  scores.innerHTML="";
  d.scores.forEach(p=>{
    scores.innerHTML+=`<div>${p.name} : ${p.score} 🔥${p.streak}</div>`;
  });
});

function leave(){
  socket.emit("leaveRoom",code);
  location.reload();
}

function voice(){
  const r=new webkitSpeechRecognition();
  r.lang="ar";
  r.onresult=e=>{
    chat.value=e.results[0][0].transcript;
  };
  r.start();
}

</script>

</body>
</html>
